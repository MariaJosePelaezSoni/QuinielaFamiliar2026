<style>
:root {
  --gold: #f5c842; --green: #00b050; --green-dark: #007a35;
  --navy: #0d1b3e; --navy2: #162447; --red: #e63946;
  --white: #fff; --gray: #8892a4;
  --card: #1a2a50; --card-border: rgba(245,200,66,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

.header{background:linear-gradient(135deg,#0d1b3e,#1a3a6e,#0d1b3e);border-bottom:3px solid var(--gold);padding:22px 20px 18px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.015) 20px,rgba(255,255,255,0.015) 40px);}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2em,6vw,3.4em);letter-spacing:3px;color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,0.4);position:relative;}
.header p{color:rgba(255,255,255,0.55);margin-top:3px;font-size:.9em;position:relative;}

.tabs{display:flex;justify-content:center;gap:6px;padding:14px 16px 0;flex-wrap:wrap;}
.tab{padding:9px 18px;border-radius:30px;border:2px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.6);font-family:'Nunito',sans-serif;font-weight:700;font-size:.85em;cursor:pointer;transition:all .2s;}
.tab:hover{border-color:var(--gold);color:var(--gold);}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}

.panel{display:none;padding:14px;max-width:880px;margin:auto;}
.panel.active{display:block;}

/* group nav */
.group-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center;}
.group-btn{padding:6px 13px;border-radius:20px;border:2px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);font-family:'Nunito',sans-serif;font-weight:700;font-size:.78em;cursor:pointer;transition:all .2s;}
.group-btn.active,.group-btn:hover{background:var(--navy2);border-color:var(--gold);color:var(--gold);}

/* match card */
.match-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:13px 15px;margin-bottom:9px;}
.match-meta{font-size:.7em;color:var(--gray);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;}
.group-tag{background:rgba(245,200,66,0.15);color:var(--gold);padding:2px 8px;border-radius:10px;font-weight:700;}
.match-row{display:flex;align-items:center;gap:8px;}
.team-col{flex:1;text-align:center;}
.team-name{font-weight:800;font-size:.9em;margin-bottom:5px;}
.score-inputs{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:5px;}
.score-input{width:44px;padding:7px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:var(--white);font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1em;text-align:center;}
.score-input:focus{outline:none;border-color:var(--gold);}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:1.3em;color:var(--gray);}
.save-btn{display:block;width:100%;margin-top:6px;padding:7px;border-radius:8px;border:none;background:rgba(245,200,66,0.15);color:var(--gold);font-family:'Nunito',sans-serif;font-weight:700;font-size:.78em;cursor:pointer;transition:all .2s;}
.save-btn:hover{background:rgba(245,200,66,0.3);}
.save-btn.saved{background:rgba(0,176,80,0.2);color:var(--green);}
.owners{font-size:.68em;color:var(--gold);opacity:.8;margin-top:3px;min-height:13px;}
.result-badge{text-align:center;font-size:.72em;margin-top:7px;font-weight:700;padding:4px 10px;border-radius:8px;}
.result-badge.win1{background:rgba(0,176,80,0.12);color:var(--green);}
.result-badge.draw{background:rgba(245,200,66,0.1);color:var(--gold);}
.vs-badge{font-family:'Bebas Neue',sans-serif;color:var(--gray);font-size:1.1em;min-width:24px;text-align:center;}

/* standings */
.standings{background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 12px;margin-top:8px;}
.standings-title{font-size:.7em;color:var(--gray);font-weight:700;letter-spacing:1px;margin-bottom:6px;}
.standing-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.78em;border-bottom:1px solid rgba(255,255,255,0.05);}
.standing-row:last-child{border-bottom:none;}
.st-pos{width:20px;font-family:'Bebas Neue',sans-serif;font-size:1.1em;color:var(--gray);}
.st-pos.q{color:var(--green);}
.st-pos.tp{color:var(--gold);}
.st-name{flex:1;font-weight:700;}
.st-stats{display:flex;gap:10px;color:var(--gray);font-size:.9em;}
.st-stats span{min-width:24px;text-align:center;}
.st-pts{font-weight:800;color:var(--white);min-width:24px;text-align:right;}
.q-label{font-size:.6em;background:rgba(0,176,80,0.2);color:var(--green);padding:1px 5px;border-radius:4px;margin-left:2px;}
.tp-label{font-size:.6em;background:rgba(245,200,66,0.15);color:var(--gold);padding:1px 5px;border-radius:4px;margin-left:2px;}

/* knockout */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.2em;letter-spacing:2px;color:rgba(255,255,255,0.4);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ko-card{background:var(--card);border:1px solid var(--card-border);border-radius:13px;padding:13px 15px;margin-bottom:9px;}
.ko-card.final-match{border-color:var(--gold);border-width:2px;background:linear-gradient(135deg,#1a2a50,#1e3560);}
.ko-desc{font-size:.7em;color:var(--gray);margin-bottom:8px;}
.ko-row{display:flex;align-items:center;gap:8px;}
.ko-btn{flex:1;padding:11px 8px;border-radius:10px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.88em;cursor:pointer;transition:all .2s;text-align:center;}
.ko-btn:hover{border-color:var(--gold);background:rgba(245,200,66,0.08);}
.ko-btn.winner{background:linear-gradient(135deg,var(--green-dark),var(--green));border-color:var(--green);color:#fff;box-shadow:0 0 14px rgba(0,176,80,0.3);}
.ko-btn.loser{opacity:.35;}
.ko-btn.tbd{color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);cursor:default;font-style:italic;font-size:.78em;}
.ko-winner-label{text-align:center;font-size:.72em;color:var(--green);margin-top:7px;font-weight:700;}

/* score tab */
.score-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:11px 15px;margin-bottom:7px;transition:transform .15s;}
.score-card:hover{transform:translateX(4px);}
.s-rank{font-family:'Bebas Neue',sans-serif;font-size:1.4em;min-width:34px;text-align:center;color:var(--gray);}
.s-rank.r1{color:#ffd700;font-size:1.6em;} .s-rank.r2{color:#c0c0c0;} .s-rank.r3{color:#cd7f32;}
.s-name{flex:1;font-weight:800;}
.s-teams{font-size:.68em;color:var(--gray);margin-top:2px;}
.s-bar-wrap{height:3px;background:rgba(255,255,255,0.07);border-radius:3px;margin-top:7px;overflow:hidden;}
.s-bar{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--gold));border-radius:3px;transition:width .5s;}
.s-pts{font-family:'Bebas Neue',sans-serif;font-size:2em;color:var(--gold);min-width:38px;text-align:right;}

/* participants */
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;}
.p-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:11px;}
.p-name{font-weight:800;font-size:.92em;margin-bottom:5px;color:var(--gold);}
.p-team{display:inline-block;font-size:.7em;background:rgba(255,255,255,0.07);border-radius:5px;padding:2px 6px;margin:2px 2px 0 0;color:rgba(255,255,255,.75);}

.reset-btn{display:block;margin:18px auto 8px;padding:9px 26px;background:transparent;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.15);border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.82em;transition:all .2s;}
.reset-btn:hover{color:var(--red);border-color:var(--red);}

@media(max-width:480px){
  .team-name{font-size:.78em;}
  .ko-btn{font-size:.75em;padding:10px 4px;}

/* sync badge */
.sync-badge{position:fixed;bottom:16px;right:16px;background:rgba(0,176,80,0.9);color:white;padding:7px 14px;border-radius:20px;font-size:.75em;font-weight:700;font-family:'Nunito',sans-serif;opacity:0;transition:opacity .4s;pointer-events:none;z-index:999;}
.sync-badge.show{opacity:1;}

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://quiniela2026-31ccf-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'quiniela');

  // Expose to global scope so non-module functions can use them
  window._fbSet = (data) => set(dbRef, data);
  window._fbListen = (cb) => onValue(dbRef, snap => cb(snap.val()));

  // Start listening — loads data and re-renders on any change from anyone
  window._fbListen((data) => {
    if(data){
      state.scores    = data.scores    || {};
      state.koResults = data.koResults || {};
    } else {
      state = {scores:{}, koResults:{}};
    }
    // Re-render whatever is currently visible
    renderGroup(activeGroup);
    renderKO();
    renderScore();
    showSyncBadge();
  });
</script>

let state = {scores:{}, koResults:{}};

function save(){
  if(window._fbSet){
    window._fbSet(state).catch(e => console.error("Firebase save error:", e));

// ═══════════════════════════════════════════
// GROUP STANDINGS ENGINE
// ═══════════════════════════════════════════
function getGroups(){ return ["A","B","C","D","E","F","G","H","I","J","K","L"]; }

function getGroupTeams(g){
  const teams = new Set();
  GROUP_MATCHES.filter(m=>m.g===g).forEach(m=>{teams.add(m.e1);teams.add(m.e2);});
  return [...teams];
}

function calcGroupStandings(g){
  const teams = getGroupTeams(g);
  const stats = {};
  teams.forEach(t=>{ stats[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,gd:0}; });

  GROUP_MATCHES.filter(m=>m.g===g).forEach(m=>{
    const sc = state.scores[m.id];
    if(!sc) return;
    const g1=sc.g1, g2=sc.g2;
    stats[m.e1].pj++; stats[m.e2].pj++;
    stats[m.e1].gf+=g1; stats[m.e1].gc+=g2;
    stats[m.e2].gf+=g2; stats[m.e2].gc+=g1;
    stats[m.e1].gd+=g1-g2; stats[m.e2].gd+=g2-g1;
    if(g1>g2){ stats[m.e1].pts+=3; stats[m.e1].pg++; stats[m.e2].pp++; }
    else if(g1<g2){ stats[m.e2].pts+=3; stats[m.e2].pg++; stats[m.e1].pp++; }
    else{ stats[m.e1].pts+=1; stats[m.e2].pts+=1; stats[m.e1].pe++; stats[m.e2].pe++; }
  });

  return Object.entries(stats)
    .sort((a,b)=>b[1].pts-a[1].pts || b[1].gd-a[1].gd || b[1].gf-a[1].gf || a[0].localeCompare(b[0]))
    .map(([name,s])=>({name,...s}));
}

// Returns team name at position pos (1-based) in group g, or null
function isGroupComplete(g){
  const matches = GROUP_MATCHES.filter(m=>m.g===g);
  return matches.every(m => state.scores[m.id] !== undefined);
}

function getGroupTeamAt(g, pos){
  if(!isGroupComplete(g)) return null;
  const st = calcGroupStandings(g);
  return st[pos-1]?.name || null;
}

// Resolve a KO slot to a team name (or null if not yet determined)
function resolveSlot(slot){
  if(slot.type === "group"){
    return getGroupTeamAt(slot.g, slot.pos);
  }
  if(slot.type === "best3rd"){
    return null; // manual for now
  }
  if(slot.type === "ko"){
    const res = state.koResults[slot.mid];
    if(!res) return null;
    return slot.r === "w" ? res.winner : res.loser;
  }
  return null;
}

function getKOMatch(id){ return KO_STRUCTURE.find(m=>m.id===id); }

function showTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='grupos') renderGroup(activeGroup);
  if(name==='eliminacion') renderKO();
  if(name==='puntaje') renderScore();
  if(name==='participantes') renderParticipants();
}

function renderGroupNav(){
  const nav = document.getElementById("group-nav");
  nav.innerHTML = getGroups().map(g=>
    `<button class="group-btn ${g===activeGroup?'active':''}" onclick="selectGroup('${g}',this)">Grupo ${g}</button>`
  ).join("");
}

function selectGroup(g, btn){
  activeGroup = g;
  document.querySelectorAll('.group-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGroup(g);
}

function getOwners(team){
  return personas.filter(p=>p.t.includes(team)).map(p=>p.n).join(", ");
}

function renderGroup(g){
  const matches = GROUP_MATCHES.filter(m=>m.g===g);
  const standings = calcGroupStandings(g);
  const totalTeams = getGroupTeams(g).length;

  let html = matches.map(m=>{
    const sc = state.scores[m.id];
    const g1 = sc ? sc.g1 : '';
    const g2 = sc ? sc.g2 : '';
    let badge = '';
    if(sc !== undefined){
      if(sc.g1 > sc.g2) badge = `<div class="result-badge win1">✅ Ganó ${m.e1} (${sc.g1}-${sc.g2})</div>`;
      else if(sc.g1 < sc.g2) badge = `<div class="result-badge win1">✅ Ganó ${m.e2} (${sc.g2}-${sc.g1})</div>`;
      else badge = `<div class="result-badge draw">🤝 Empate (${sc.g1}-${sc.g2})</div>`;
    }
    return `
    <div class="match-card">
      <div class="match-meta">
        <span>${m.f} · ${m.v}</span>
        <span class="group-tag">Grupo ${m.g}</span>
      </div>
      <div class="match-row">
        <div class="team-col">
          <div class="team-name">${m.e1}</div>
          <div class="score-inputs">
            <input class="score-input" id="g1-${m.id}" type="number" min="0" max="99" value="${g1}" placeholder="0">
          </div>
          <div class="owners">${getOwners(m.e1)}</div>
        </div>
        <div class="vs-badge">–</div>
        <div class="team-col">
          <div class="team-name">${m.e2}</div>
          <div class="score-inputs">
            <input class="score-input" id="g2-${m.id}" type="number" min="0" max="99" value="${g2}" placeholder="0">
          </div>
          <div class="owners">${getOwners(m.e2)}</div>
        </div>
      </div>
      ${badge}
      <button class="save-btn ${sc?'saved':''}" onclick="saveScore('${m.id}','${m.e1}','${m.e2}')">
        ${sc ? '✅ Guardado — click para actualizar' : '💾 Guardar resultado'}
      </button>
    </div>`;
  }).join("");

  // Standings table
  html += `<div class="standings">
    <div class="standings-title">POSICIONES GRUPO ${g} — PJ PG PE PP GF GC DIF PTS</div>
    ${standings.map((s,i)=>{
      const isQ = i < 2;
      const isTP = i === 2;
      return `<div class="standing-row">
        <div class="st-pos ${isQ?'q':isTP?'tp':''}">${i+1}</div>
        <div class="st-name">${s.name}${isQ?'<span class="q-label">CLASIFICA</span>':isTP?'<span class="tp-label">POSIBLE 3º</span>':''}</div>
        <div class="st-stats">
          <span>${s.pj}</span><span>${s.pg}</span><span>${s.pe}</span><span>${s.pp}</span>
          <span>${s.gf}</span><span>${s.gc}</span><span>${s.gd>0?'+'+s.gd:s.gd}</span>
        </div>
        <div class="st-pts">${s.pts}</div>
      </div>`;
    }).join("")}
  </div>`;

  document.getElementById("group-content").innerHTML = html;
}

function saveScore(id, e1, e2){
  const v1 = parseInt(document.getElementById('g1-'+id).value);
  const v2 = parseInt(document.getElementById('g2-'+id).value);
  if(isNaN(v1)||isNaN(v2)){ alert("Ingresa ambos marcadores"); return; }
  state.scores[id] = {g1:v1, g2:v2};
  save();
  renderGroup(activeGroup);
  // refresh KO if open
  if(document.getElementById('tab-eliminacion').classList.contains('active')) renderKO();
}

// ═══════════════════════════════════════════
// KNOCKOUT TAB
// ═══════════════════════════════════════════
function renderKO(){
  const rounds = [...new Set(KO_STRUCTURE.map(m=>m.round))];
  let html = '';
  rounds.forEach(round=>{
    html += `<div class="section-title">${round}</div>`;
    KO_STRUCTURE.filter(m=>m.round===round).forEach(m=>{
      const t1 = resolveSlot(m.s1);
      const t2 = resolveSlot(m.s2);
      const res = state.koResults[m.id];
      const winner = res?.winner;
      const isFinal = m.round.includes('FINAL');

      const btn1Class = !t1 ? 'tbd' : winner===t1?'winner':winner?'loser':'';
      const btn2Class = !t2 ? 'tbd' : winner===t2?'winner':winner?'loser':'';

      function slotLabel(slot, resolved){
        if(resolved) return resolved;
        if(slot.type==='group'){
          const pos = slot.pos===1?'1º':slot.pos===2?'2º':'3º';
          return '⏳ '+pos+' Grupo '+slot.g;
        }
        if(slot.type==='best3rd') return '⏳ '+slot.label;
        if(slot.type==='ko') return '⏳ Ganador partido '+slot.mid.replace('M','');
        return '⏳ Pendiente';
      }

      const btn1Label = slotLabel(m.s1, t1);
      const btn2Label = slotLabel(m.s2, t2);
      const canClick = !!(t1 && t2);

      html += `
      <div class="ko-card ${isFinal?'final-match':''}">
        <div class="match-meta">
          <span>${m.f} · ${m.v}</span>
          ${winner?`<span style="color:var(--green);font-weight:700;font-size:.75em">✅ ${winner}</span>`:''}
        </div>
        <div class="ko-row">
          <button class="ko-btn ${btn1Class}" onclick="${canClick?`setKOWinner('${m.id}','${t1}','${t2}')`:''}">${btn1Label}</button>
          <div class="vs-badge">VS</div>
          <button class="ko-btn ${btn2Class}" onclick="${canClick?`setKOWinner('${m.id}','${t2}','${t1}')`:''}">${btn2Label}</button>
        </div>
        ${winner?`<div class="ko-winner-label">✅ Avanza: ${winner} ${res.loser?'· Eliminado: '+res.loser:''}</div>`:''}
        ${!canClick&&!winner?`<div style="font-size:.68em;color:var(--gray);text-align:center;margin-top:6px">⏳ Esperando resultados de grupos</div>`:''}
        ${winner?`<div style="text-align:center;margin-top:4px"><span onclick="clearKO('${m.id}')" style="font-size:.68em;color:var(--gray);cursor:pointer;">✖ borrar resultado</span></div>`:''}
      </div>`;
    });
  });
  document.getElementById("ko-content").innerHTML = html;
}

function setKOWinner(matchId, winner, loser){
  state.koResults[matchId] = {winner, loser};
  save();
  renderKO();
  if(document.getElementById('tab-puntaje').classList.contains('active')) renderScore();
}

function clearKO(id){
  delete state.koResults[id];
  // also clear dependent matches downstream
  clearDownstream(id);
  save();
  renderKO();
}

function clearDownstream(clearedId){
  KO_STRUCTURE.forEach(m=>{
    const deps = [m.s1, m.s2].filter(s=>s.type==='ko' && s.mid===clearedId);
    if(deps.length && state.koResults[m.id]){
      delete state.koResults[m.id];
      clearDownstream(m.id);
    }
  });
}

// ═══════════════════════════════════════════
// SCORE TAB
// ═══════════════════════════════════════════
function getAllWinners(){
  const winners = [];
  // from group scores: winner of each match
  GROUP_MATCHES.forEach(m=>{
    const sc = state.scores[m.id];
    if(!sc) return;
    if(sc.g1 > sc.g2) winners.push(m.e1);
    else if(sc.g2 > sc.g1) winners.push(m.e2);
    // draw: no winner point
  });
  // from KO results
  Object.values(state.koResults).forEach(r=>{ if(r.winner) winners.push(r.winner); });
  return winners;
}

function calcScore(){
  const winners = getAllWinners();
  return personas.map(p=>({
    ...p,
    pts: winners.filter(w=>p.t.includes(w)).length
  })).sort((a,b)=>b.pts-a.pts);
}

function renderScore(){
  const scores = calcScore();
  const maxPts = scores[0]?.pts || 1;
  const medals = ["🥇","🥈","🥉"];
  document.getElementById("score-list").innerHTML = scores.map((s,i)=>{
    const rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    return `
    <div class="score-card">
      <div class="s-rank ${rc}">${medals[i]||i+1}</div>
      <div style="flex:1">
        <div class="s-name">${s.n}</div>
        <div class="s-teams">${s.t.join(' · ')}</div>
        <div class="s-bar-wrap"><div class="s-bar" style="width:${maxPts?(s.pts/maxPts*100):0}%"></div></div>
      </div>
      <div class="s-pts">${s.pts}</div>
    </div>`;
  }).join("");
}
